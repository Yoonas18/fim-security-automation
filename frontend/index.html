<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FIM Security Watchdog</title>
  <style>
    :root {
      --bg: #080c12;
      --bg-2: #101722;
      --panel: rgba(18, 27, 39, 0.86);
      --panel-strong: #151f2e;
      --panel-soft: #1b293a;
      --border: rgba(132, 154, 184, 0.2);
      --text: #eef5ff;
      --muted: #91a4ba;
      --accent: #42a5ff;
      --cyan: #27e0d8;
      --green: #56d364;
      --yellow: #f2cc60;
      --orange: #ff9f43;
      --red: #ff5c73;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(39, 224, 216, 0.1), transparent 28%),
        linear-gradient(215deg, rgba(66, 165, 255, 0.16), transparent 34%),
        linear-gradient(180deg, #111827 0%, var(--bg) 45%, #06080d 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(45, 63, 86, 0.96), rgba(25, 38, 55, 0.96));
      color: var(--text);
      border-radius: 6px;
      padding: 9px 12px;
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    button:hover {
      border-color: rgba(66, 165, 255, 0.62);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      border-color: var(--accent);
      color: #03111f;
      font-weight: 800;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(8, 13, 20, 0.78);
      color: var(--text);
      border-radius: 6px;
      padding: 10px 11px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(39, 224, 216, 0.65);
      box-shadow: 0 0 0 3px rgba(39, 224, 216, 0.1);
    }

    .hidden { display: none !important; }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .login::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
      pointer-events: none;
    }

    .login-box {
      width: min(420px, 100%);
      background: linear-gradient(180deg, rgba(21, 31, 46, 0.96), rgba(13, 19, 29, 0.96));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--accent), var(--red));
    }

    .login-box h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }

    .login-box p {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.45;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 13, 20, 0.86);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(39, 224, 216, 0.24), rgba(66, 165, 255, 0.2)),
        #0b141f;
      border: 1px solid rgba(39, 224, 216, 0.35);
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-weight: 900;
      box-shadow: 0 0 28px rgba(39, 224, 216, 0.16);
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(10, 18, 28, 0.72);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px 120px auto;
      gap: 10px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 20, 31, 0.72);
      backdrop-filter: blur(12px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
      padding: 16px 22px 0;
    }

    .stat {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(24, 36, 52, 0.95), rgba(15, 23, 35, 0.95));
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--accent);
      opacity: 0.9;
    }

    .stat:nth-child(2)::before { background: var(--green); }
    .stat:nth-child(3)::before { background: var(--yellow); }
    .stat:nth-child(4)::before { background: var(--red); }

    .stat:hover {
      border-color: rgba(66, 165, 255, 0.42);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 28px;
      line-height: 1;
    }

    main {
      display: grid;
      grid-template-columns: 42% 1fr;
      gap: 14px;
      padding: 16px 22px 22px;
      min-height: 0;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18, 27, 39, 0.94), rgba(11, 17, 26, 0.94));
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .pane-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.025);
    }

    .list {
      overflow: auto;
      min-height: 340px;
    }

    .event {
      display: grid;
      gap: 7px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
      background: rgba(255, 255, 255, 0.01);
      transition: background 150ms ease;
    }

    .event:hover {
      background: rgba(66, 165, 255, 0.06);
    }

    .event::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
    }

    .event.low::before { background: var(--green); }
    .event.medium::before { background: var(--yellow); }
    .event.high::before { background: var(--orange); }
    .event.critical::before { background: var(--red); }
    .event.file_deleted { background: rgba(255, 92, 115, 0.04); }
    .event.file_modified { background: rgba(242, 204, 96, 0.035); }
    .event.file_created { background: rgba(86, 211, 100, 0.03); }
    }

    .event-head {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .agent {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ffffff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: rgba(31, 42, 55, 0.92);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .low { color: var(--green); background: rgba(86, 211, 100, 0.1); }
    .medium { color: var(--yellow); background: rgba(242, 204, 96, 0.1); }
    .high { color: var(--orange); background: rgba(255, 159, 67, 0.12); }
    .critical { color: var(--red); background: rgba(255, 92, 115, 0.13); }

    .file {
      color: #c9d1d9;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      background: rgba(8, 13, 20, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.045);
      border-radius: 6px;
      padding: 7px 8px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      min-height: 140px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .error {
      color: var(--red);
      min-height: 20px;
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .toolbar, main, .stats {
        grid-template-columns: 1fr;
      }

      .status {
        margin-left: 0;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <section id="login" class="login">
    <form id="loginForm" class="login-box">
      <h1>FIM Security Watchdog</h1>
      <p>Sign in to view file integrity events, agent activity, and alert severity.</p>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="primary" type="submit">Sign in</button>
      <div id="loginError" class="error"></div>
    </form>
  </section>

  <section id="app" class="shell hidden">
    <header>
      <div class="brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>FIM Security Watchdog</h1>
          <div class="subtitle">Integrity monitoring command center</div>
        </div>
      </div>
      <div id="status" class="status">Connecting...</div>
      <button id="logout">Logout</button>
    </header>

    <div class="toolbar">
      <input id="agentFilter" placeholder="Filter by agent id" />
      <select id="eventFilter">
        <option value="">All event types</option>
        <option value="file_created">Created</option>
        <option value="file_modified">Modified</option>
        <option value="file_deleted">Deleted</option>
      </select>
      <select id="limitFilter">
        <option value="50">50 rows</option>
        <option value="200" selected>200 rows</option>
        <option value="500">500 rows</option>
      </select>
      <button id="reload">Reload</button>
    </div>

    <div class="stats">
      <div class="stat"><span>Total events</span><strong id="totalEvents">0</strong></div>
      <div class="stat"><span>Created</span><strong id="createdCount">0</strong></div>
      <div class="stat"><span>Modified</span><strong id="modifiedCount">0</strong></div>
      <div class="stat"><span>Deleted</span><strong id="deletedCount">0</strong></div>
    </div>

    <main>
      <section class="pane">
        <div class="pane-title">
          <span>Live alerts</span>
          <button id="clearLive">Clear</button>
        </div>
        <div id="liveList" class="list"></div>
      </section>

      <section class="pane">
        <div class="pane-title">
          <span>Event history</span>
          <span id="historyCount">0 items</span>
        </div>
        <div id="historyList" class="list"></div>
      </section>
    </main>
  </section>

  <script>
    const login = document.getElementById("login");
    const app = document.getElementById("app");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const statusEl = document.getElementById("status");
    const liveList = document.getElementById("liveList");
    const historyList = document.getElementById("historyList");
    const historyCount = document.getElementById("historyCount");
    const agentFilter = document.getElementById("agentFilter");
    const eventFilter = document.getElementById("eventFilter");
    const limitFilter = document.getElementById("limitFilter");
    const reloadBtn = document.getElementById("reload");
    const clearLiveBtn = document.getElementById("clearLive");
    const logoutBtn = document.getElementById("logout");
    let eventSource;

    function text(value) {
      return value === null || value === undefined || value === "" ? "-" : String(value);
    }

    function formatTime(seconds) {
      return seconds ? new Date(seconds * 1000).toLocaleString() : "-";
    }

    function makeEventRow(item) {
      const row = document.createElement("article");
      row.className = `event ${item.severity || ""} ${item.event || ""}`;

      const head = document.createElement("div");
      head.className = "event-head";

      const agent = document.createElement("span");
      agent.className = "agent";
      agent.textContent = text(item.agent);

      const event = document.createElement("span");
      event.className = "badge";
      event.textContent = text(item.event);

      const severity = document.createElement("span");
      severity.className = `badge ${item.severity || ""}`;
      severity.textContent = text(item.severity);

      head.append(agent, event, severity);

      const file = document.createElement("div");
      file.className = "file";
      file.textContent = text(item.file);

      const meta = document.createElement("div");
      meta.className = "meta";
      const time = document.createElement("span");
      time.textContent = formatTime(item.time);
      const size = document.createElement("span");
      size.textContent = item.size ? `${item.size} bytes` : "size unknown";
      const hash = document.createElement("span");
      hash.textContent = item.hash ? `sha256 ${item.hash.slice(0, 16)}...` : "hash unavailable";
      meta.append(time, size, hash);

      row.append(head, file, meta);
      return row;
    }

    function renderList(target, items) {
      target.replaceChildren();
      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No events found.";
        target.append(empty);
        return;
      }

      items.forEach(item => target.append(makeEventRow(item)));
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    async function loadStats() {
      const stats = await api("/api/stats");
      document.getElementById("totalEvents").textContent = stats.total || 0;
      document.getElementById("createdCount").textContent = stats.by_event.file_created || 0;
      document.getElementById("modifiedCount").textContent = stats.by_event.file_modified || 0;
      document.getElementById("deletedCount").textContent = stats.by_event.file_deleted || 0;
    }

    async function loadHistory() {
      const params = new URLSearchParams({ limit: limitFilter.value });
      if (eventFilter.value) params.set("event", eventFilter.value);
      if (agentFilter.value.trim()) params.set("agent", agentFilter.value.trim());
      const items = await api(`/api/history?${params.toString()}`);
      renderList(historyList, items);
      historyCount.textContent = `${items.length} items`;
      await loadStats();
    }

    function connectEvents() {
      if (eventSource) eventSource.close();
      statusEl.textContent = "Connecting...";
      eventSource = new EventSource("/api/events");

      eventSource.onopen = () => {
        statusEl.textContent = "Connected";
        statusEl.style.color = "var(--green)";
      };

      eventSource.onmessage = async (message) => {
        const event = JSON.parse(message.data);
        liveList.prepend(makeEventRow(event));
        await loadStats();
      };

      eventSource.onerror = () => {
        statusEl.textContent = "Disconnected, retrying...";
        statusEl.style.color = "var(--yellow)";
        eventSource.close();
        setTimeout(connectEvents, 2500);
      };
    }

    async function showApp() {
      login.classList.add("hidden");
      app.classList.remove("hidden");
      await loadHistory();
      connectEvents();
    }

    async function checkSession() {
      try {
        await api("/api/auth/me");
        await showApp();
      } catch {
        login.classList.remove("hidden");
        app.classList.add("hidden");
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.textContent = "";
      try {
        await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
          })
        });
        await showApp();
      } catch {
        loginError.textContent = "Invalid username or password.";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await api("/api/auth/logout", { method: "POST", body: "{}" });
      if (eventSource) eventSource.close();
      app.classList.add("hidden");
      login.classList.remove("hidden");
    });

    reloadBtn.addEventListener("click", loadHistory);
    clearLiveBtn.addEventListener("click", () => liveList.replaceChildren());
    eventFilter.addEventListener("change", loadHistory);
    limitFilter.addEventListener("change", loadHistory);
    agentFilter.addEventListener("change", loadHistory);

    checkSession();
  </script>
</body>
</html>
